site_name: VLA-REPLICA Setup Guide
repo_url: https://github.com/IRVLUTD/VLAReplica
theme:
  name: readthedocs
extra_css:
  - css/custom.css
nav:
  - Setup Guide:
      - Overview & prerequisites: index.md
      - Bill of materials: bill-of-materials.md
      - Hardware assembly: hardware-assembly.md
      - Software installation: software-installation.md
      - System Calibration: system-calibration.md
      - Running evaluations: running-evaluations.md
      - Task reference: task-reference.md
      - Troubleshooting & checklists: troubleshooting.md
site_url: https://irvlutd.github.io/VLAReplica/setup-docs/

docs_dir: VLAReplica/setup-docs
# Output the built site to the repository root `setup-docs` directory
# (one level up from this config file). This keeps the source docs in
# `VLAReplica/setup-docs` and writes the static site to
# `/irvlutd.github.io/setup-docs` so GitHub Pages can serve it at
# `/VLAReplica/setup-docs/`.
site_dir: ../setup-docs

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
