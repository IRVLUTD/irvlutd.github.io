<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description"
    content="iTeach: In the Wild Interactive Teaching for Failure-Driven Adaptation of Robot Perception">
  <meta name="author" content="Jishnu Jaykumar P, Cole Salvato, Vinaya Bomnale, Jikai Wang, Yu Xiang">
  <title>iTeach — Under Maintenance | In the Wild Interactive Teaching for Failure-Driven Adaptation of Robot Perception
  </title>
  <link rel="icon" href="#">
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a0a0c;
      --accent-primary: #818cf8;
      --accent-secondary: #c084fc;
      --text-main: #f8fafc;
      --text-dim: #94a3b8;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.06);
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--bg-dark);
      color: var(--text-main);
      overflow: hidden;
      position: relative;
    }

    /* High-end animated aurora background */
    .aurora-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
      background: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #0a0a0c 80%);
    }

    .aurora {
      position: absolute;
      width: 150%;
      height: 150%;
      top: -25%;
      left: -25%;
      background:
        radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.12) 0%, transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(192, 132, 252, 0.08) 0%, transparent 50%);
      filter: blur(80px);
      animation: aurora-drift 20s ease-in-out infinite alternate;
    }

    @keyframes aurora-drift {
      0% {
        transform: scale(1) translate(0, 0) rotate(0deg);
      }

      50% {
        transform: scale(1.1) translate(2%, 3%) rotate(2deg);
      }

      100% {
        transform: scale(1) translate(-1%, -2%) rotate(-1deg);
      }
    }

    /* Glass Card Layout */
    .glass-card {
      position: relative;
      z-index: 10;
      width: 90%;
      max-width: 700px;
      padding: 4rem 3rem;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 32px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: card-appear 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes card-appear {
      from {
        opacity: 0;
        transform: translateY(40px) scale(0.98);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Decorative elements */
    .brand-accent {
      display: inline-block;
      margin-bottom: 2rem;
      padding: 0.5rem 1.25rem;
      background: linear-gradient(90deg, rgba(129, 140, 248, 0.1), rgba(192, 132, 252, 0.1));
      border: 1px solid rgba(129, 140, 248, 0.2);
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent-primary);
    }

    h1 {
      font-size: 2.25rem;
      line-height: 1.2;
      font-weight: 300;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
    }

    h1 em {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 400;
      color: var(--text-main);
    }

    h1 b {
      font-weight: 600;
      background: linear-gradient(135deg, var(--text-main) 30%, var(--accent-primary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 1rem;
      color: var(--text-dim);
      max-width: 500px;
      margin: 0 auto 3rem;
      line-height: 1.6;
      font-weight: 300;
    }

    .divider {
      height: 1px;
      width: 60px;
      background: linear-gradient(90deg, transparent, var(--glass-border), transparent);
      margin: 0 auto 3rem;
    }

    /* Clean progress/status indicator */
    .status-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .maintenance-text {
      font-size: 0.9rem;
      color: var(--text-dim);
      font-weight: 400;
      letter-spacing: 0.05em;
    }

    .progress-track {
      width: 200px;
      height: 2px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
      animation: progress-slide 3s infinite cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes progress-slide {
      0% {
        left: -100%;
      }

      50% {
        left: 0%;
      }

      100% {
        left: 100%;
      }
    }

    /* Floating particles for depth */
    .particles span {
      position: absolute;
      background: white;
      border-radius: 50%;
      opacity: 0.2;
      pointer-events: none;
    }

    @media (max-width: 640px) {
      .glass-card {
        padding: 3rem 1.5rem;
      }

      h1 {
        font-size: 1.75rem;
      }
    }
  </style>
</head>

<body>
  <div class="aurora-container">
    <div class="aurora"></div>
  </div>

  <div class="glass-card">
    <div class="brand-accent">In Progress</div>

    <h1>
      <em>iTeach:</em> In the Wild <b>Interactive Teaching</b><br>
      for Failure-Driven Adaptation of Robot Perception
    </h1>

    <p class="subtitle">
      Our repository is currently being updated for the journal submission.
      The full website will be available shortly.
    </p>

    <div class="divider"></div>

    <div class="status-container">
      <span class="maintenance-text">Maintenance under progress</span>
      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>
    </div>
  </div>

  <script>
    // Subtle mouse parallax effect for the card
    const card = document.querySelector('.glass-card');
    document.addEventListener('mousemove', (e) => {
      const x = (window.innerWidth / 2 - e.pageX) / 50;
      const y = (window.innerHeight / 2 - e.pageY) / 50;
      card.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
    });
  </script>
</body>

</html>
